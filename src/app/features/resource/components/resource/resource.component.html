<svg-icon
  class="icon"
  [src]="iconsPath + resourceData[data().key].icon + '.svg'"
  [style.color]="resourceData[data().key].color"
/>

<div class="info" [style.color]="resourceData[data().key].color">
  @if (!isShort()) {
    <p class="name">{{ resourceData[data().key].name }}:</p>
  }

  <p class="value">
    {{ data().value.toString() }}
  </p>
</div>
