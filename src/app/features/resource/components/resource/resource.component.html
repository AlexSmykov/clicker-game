<svg-icon
  class="icon"
  [src]="iconsPath + resourceData[data().key].icon + '.svg'"
  [style.color]="resourceData[data().key].color"
/>

<p [style.color]="resourceData[data().key].color">
  @if (!isShort()) {
    <span class="name"> {{ resourceData[data().key].name }}: </span>
  }

  <span class="value">
    {{ data().value.toString() }}
  </span>
</p>
